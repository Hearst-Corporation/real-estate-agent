<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Real estate Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: rgba(26, 5, 11, 0.94);
      backdrop-filter: blur(20px);
      color: #f5f5f5;
      font-family: -apple-system, ui-sans-serif, system-ui, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 32px; }
    .logo { width: 48px; height: 48px; margin-bottom: 16px; color: #fff; }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 8px; }
    p { font-size: 13px; color: rgba(245,245,245,0.55); margin-bottom: 32px; }
    .options { display: flex; gap: 12px; -webkit-app-region: no-drag; }
    button {
      flex: 1; min-width: 160px; padding: 20px 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px; color: #f5f5f5; font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    button:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(225, 29, 72, 0.5); transform: translateY(-1px); }
    button .label { display: block; font-weight: 600; margin-bottom: 4px; }
    button .url { display: block; font-size: 11px; color: rgba(245,245,245,0.5); font-family: ui-monospace, monospace; }
    .footer { margin-top: 32px; font-size: 11px; color: rgba(245,245,245,0.35); -webkit-app-region: no-drag; }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="logo" viewBox="560 455 155 170" fill="currentColor" aria-hidden="true">
      <polygon points="601.74 466.87 572.6 466.87 572.6 609.73 601.74 609.73 601.74 549.07 633.11 579.43 665.76 579.43 601.74 517.46 601.74 466.87"/>
      <polygon points="672.72 466.87 672.72 528.12 644.63 500.93 611.98 500.93 672.72 559.72 672.72 609.73 701.86 609.73 701.86 466.87 672.72 466.87"/>
    </svg>
    <h1>Real estate Agent</h1>
    <p>Sélectionne l'environnement à lancer</p>
    <div class="options">
      <button class="local" onclick="window.electron.selectEnv('local')">
        <span class="label">Local</span>
        <span class="url">localhost:3002</span>
      </button>
      <button class="prod" onclick="window.electron.selectEnv('prod')">
        <span class="label">Production</span>
        <span class="url">real-estate-agent.vercel.app</span>
      </button>
    </div>
    <div class="footer">Cmd+Q pour quitter · Menu → Changer d'environnement pour revenir ici</div>
  </div>
  <script>
    window.electron.getLastEnv().then(env => {
      const btn = document.querySelector('.' + env);
      if (btn) btn.style.borderColor = 'rgba(225, 29, 72, 0.5)';
    });
  </script>
</body>
</html>
