<!DOCTYPE html>
<html>
<head>
<style>
.ct-viz-row {
  display: grid;
  grid-template-columns: 6fr 4fr;
  gap: 24px;
  height: 380px;
  background: #ccc;
  padding: 20px;
}
.ct-viz-row > * {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #aaa;
}
.ct-card {
  display: flex;
  flex-direction: column;
  flex: 1;
  background: #f00;
  border: 2px solid #000;
}
</style>
</head>
<body>
  <div class="ct-viz-row">
    <div>
      <div class="ct-card">Card 1</div>
    </div>
    <div>
      <div class="ct-card">Card 2</div>
    </div>
  </div>
</body>
</html>
