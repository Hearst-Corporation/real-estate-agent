[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
# EVM cible : "paris" (sans PUSH0) pour maximiser la compat des chaînes EVM
# permissionnées / L2 EU (Polygon PoS, certains réseaux DLT Pilot encore < Shanghai).
evm_version = "paris"
via_ir = false
ffi = false
fs_permissions = []

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"

# Tout l'écosystème ERC-3643 (token + registries + compliance) ainsi que les
# primitives type-OpenZeppelin (Ownable/Pausable/ReentrancyGuard/proxy) sont
# VENDORÉS sous src/vendor — aucune dépendance externe pour le code de prod.
# Seule la SUITE DE TESTS dépend de forge-std (cheatcodes Foundry). Installer via :
#   forge install foundry-rs/forge-std --no-git
remappings = ["forge-std/=lib/forge-std/src/"]
